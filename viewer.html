<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>Pricelist – ALUX</title>
<style>
  :root {
    --bg: #0a0b0e;
    --panel: #14161b;
    --border: #2a2d36;
    --text: #e4e6eb;
    --muted: #8b8e99;
    --accent: #6366f1;
    --row-hover: #1e2028;
    --sticky-bg: #14161b;
    --header-bg: #1a1c22;
    --pergola: #6366f1;
    --screen: #10b981;
    --glazing: #06b6d4;
    --awning: #f59e0b;
    --accessory: #a855f7;
    --extra: #f43f5e;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font: 13px/1.4 -apple-system, system-ui, sans-serif; height: 100vh; overflow: hidden; }
  body { display: flex; flex-direction: column; }

  .topbar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--header-bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .topbar h1 { margin: 0; font-size: 14px; font-weight: 600; }
  .topbar .meta { color: var(--muted); font-size: 11px; }
  .topbar input, .topbar select, .topbar button {
    background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 4px; font: inherit;
  }
  .topbar input { width: 200px; }
  .topbar button { cursor: pointer; }
  .topbar button:hover { background: var(--row-hover); }
  .topbar button#save { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }
  .topbar button#save:disabled { background: var(--panel); border-color: var(--border); color: var(--muted); cursor: not-allowed; font-weight: normal; }
  .topbar button#save:hover:not(:disabled) { background: #5558e3; }
  .topbar button#pick.connected { color: #10b981; border-color: #10b981; }
  .topbar .spacer { flex: 1; }
  #status { color: #10b981; font-size: 11px; opacity: 0; transition: opacity 0.3s; }

  .container { flex: 1; overflow: auto; position: relative; }

  table.grid { border-collapse: separate; border-spacing: 0; width: max-content; min-width: 100%; table-layout: fixed; }
  table.grid th, table.grid td { padding: 0; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 12px; }
  table.grid thead th {
    position: sticky; top: 0; background: var(--header-bg); font-weight: 600; text-align: left; z-index: 3;
    border-bottom: 2px solid var(--border); padding: 8px 10px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted);
  }
  table.grid tbody td { height: 28px; vertical-align: middle; background: var(--bg); }
  table.grid tbody tr:hover td { background: var(--row-hover); }
  table.grid td.sku-cell, table.grid th.sku-cell { position: sticky; left: 0; z-index: 2; background: var(--sticky-bg); font-family: 'SF Mono', Menlo, monospace; font-size: 11px; }
  table.grid thead th.sku-cell { z-index: 4; }
  table.grid td input, table.grid td textarea {
    width: 100%; height: 100%; background: transparent; border: none; color: var(--text);
    padding: 4px 10px; font: inherit; outline: none; resize: none;
  }
  table.grid td:focus-within { background: rgba(99, 102, 241, 0.12); box-shadow: inset 0 0 0 1px var(--accent); }
  table.grid td.edited { background: rgba(99, 102, 241, 0.08); }
  table.grid td.edited input, table.grid td.edited textarea { color: #a5b4fc; }
  table.grid td.num input { text-align: right; font-variant-numeric: tabular-nums; }
  table.grid td.readonly { background: #0f1014; color: var(--muted); padding: 4px 10px; cursor: default; user-select: text; }
  table.grid td.readonly.sku-cell { background: #0f1014; }

  .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .pill.pergola   { background: rgba(99, 102, 241, 0.15); color: var(--pergola); }
  .pill.screen    { background: rgba(16, 185, 129, 0.15); color: var(--screen); }
  .pill.glazing   { background: rgba(6, 182, 212, 0.15); color: var(--glazing); }
  .pill.awning    { background: rgba(245, 158, 11, 0.15); color: var(--awning); }
  .pill.accessory { background: rgba(168, 85, 247, 0.15); color: var(--accessory); }
  .pill.extra     { background: rgba(244, 63, 94, 0.15); color: var(--extra); }

  .empty { color: var(--muted); font-style: italic; }
  .hint { color: var(--muted); font-size: 11px; }
</style>
</head>
<body>
  <div class="topbar">
    <h1>Pricelist</h1>
    <span class="meta" id="metaInfo"></span>

    <input id="search" placeholder="Filtr (SKU, název, kategorie…)">

  </div>
  <div class="container" id="container"></div>

let folderHandle = null;
const dirty = new Map(); // filePath -> item object

const $ = id => document.getElementById(id);
const container = $('container');

function filePath(item) { return `${item._folder}/${item.sku}/item.json`; }
function stripInternal(item) {
  const out = {};
  for (const k of Object.keys(item)) if (!k.startsWith('_')) out[k] = item[k];
  return out;
}
function markDirty(item) {
  dirty.set(filePath(item), stripInternal(item));
  refreshSaveBtn();
}

// Computed "Náklad" column helper
function readCol(item, key) {
  if (key === '_naklad') return item.cost_percent != null ? item.cost_percent : item.cost;
  return item[key];
}
function writeCol(item, key, val) {
  if (key === '_naklad') {
    const isProduct = ['pergola','screen','glazing','awning'].includes(item.category);
    if (isProduct) { item.cost_percent = val; item.cost = null; }
    else           { item.cost = val;         item.cost_percent = null; }
    return;
  }
  item[key] = val;
}

function hasFSA() { return typeof window.showDirectoryPicker === 'function'; }

async function pickFolder() {
  if (!hasFSA()) { alert('Váš prohlížeč nepodporuje přímý zápis. Použijte Chrome / Edge.'); return; }
  try {
    folderHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
  } catch (e) {
    if (e.name !== 'AbortError') alert('Chyba: ' + e.message);
    return;
  }
  try {
    await folderHandle.getFileHandle('meta.json');
  } catch {
    alert('Vybraná složka neobsahuje meta.json — vyberte kořen pricelistu.');
    folderHandle = null;
    return;
  }
  flashStatus('Složka připojena: ' + folderHandle.name);
  refreshSaveBtn();
}

async function getFileHandle(root, relPath) {
  const parts = relPath.split('/');
  let h = root;
  for (let i = 0; i < parts.length - 1; i++) {
    h = await h.getDirectoryHandle(parts[i], { create: false });
  }
  return h.getFileHandle(parts[parts.length - 1], { create: false });
}

async function writeFile(root, relPath, content) {
  const fh = await getFileHandle(root, relPath);
  const w = await fh.createWritable();
  await w.write(JSON.stringify(content, null, 2) + '\n');
  await w.close();
}

async function saveAll() {
  if (dirty.size === 0) return;
  if (!folderHandle) {
    if (hasFSA()) {
      await pickFolder();
      if (!folderHandle) return;
    } else {
      downloadBundle();
      return;
    }
  }
  let saved = 0, failed = 0, errors = [];
  for (const [path, content] of dirty.entries()) {
    try {
      await writeFile(folderHandle, path, content);
      saved++;
    } catch (e) {
      failed++;
      errors.push(`${path}: ${e.message}`);
    }
  }
  if (failed === 0) {
    dirty.clear();
    document.querySelectorAll('td.edited').forEach(el => el.classList.remove('edited'));
    refreshSaveBtn();
    flashStatus(`Uloženo ${saved} ${saved === 1 ? 'soubor' : 'souborů'}`);
  } else {
    alert(`Uloženo ${saved}, selhalo ${failed}:\n\n` + errors.join('\n'));
  }
}

function downloadBundle() {
  const bundle = {};
  for (const [k, v] of dirty.entries()) bundle[k] = v;
  const blob = new Blob([JSON.stringify(bundle, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `pricelist-changes-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function refreshSaveBtn() {
  const btn = $('save');
  const pick = $('pick');
  const n = dirty.size;
  if (!hasFSA()) {
    pick.style.display = 'none';
    btn.textContent = n > 0 ? `Stáhnout změny (${n})` : 'Stáhnout změny';
  } else if (folderHandle) {
    pick.textContent = '✓ ' + folderHandle.name;
    pick.classList.add('connected');
    btn.textContent = n > 0 ? `Uložit (${n})` : 'Uloženo';
  } else {
    pick.classList.remove('connected');
    pick.textContent = 'Vybrat složku';
    btn.textContent = n > 0 ? `Uložit (${n})` : 'Uložit';
  }
  btn.disabled = n === 0;
}

function flashStatus(msg) {
  const el = $('status');
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(flashStatus._t);
  flashStatus._t = setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

  const q = searchQuery.toLowerCase();
  return DATA.items.filter(it => {
    if (catFilter && it.category !== catFilter) return false;
    if (!q) return true;
    const hay = [
      it.sku, it.name_cs, it.name_en, it.category,
      it.description_cs, it.description_en, it.color_options,
    ].join(' ').toLowerCase();
    return hay.includes(q);
  });
}

function render() {
  const items = currentItems();
  $('metaInfo').textContent = `${items.length} / ${DATA.items.length} položek · ${DATA.meta.currency}`;

  let colgroup = '<colgroup>';
  for (const col of COLUMNS) colgroup += `<col style="width:${col.width}px">`;
  colgroup += '</colgroup>';

  let head = '<thead><tr>';
  for (const col of COLUMNS) {
    const cls = col.sticky ? 'sku-cell' : '';
    head += `<th class="${cls}">${esc(col.label)}</th>`;
  }
  head += '</tr></thead>';

  let body = '<tbody>';
  for (const item of items) {
    const rowKey = item._folder + '/' + item.sku;
    body += `<tr data-key="${esc(rowKey)}">`;
    for (const col of COLUMNS) {
      const val = readCol(item, col.key);
      const typeClass = col.type === 'num' ? 'num' : '';
      const stickyClass = col.sticky ? 'sku-cell' : '';
      const readonlyClass = col.readonly ? 'readonly' : '';
      const classes = [typeClass, stickyClass, readonlyClass].filter(Boolean).join(' ');

      if (col.readonly) {
        if (col.type === 'pill') {
          body += `<td class="${classes}"><span class="pill ${esc(item.category||'')}">${esc(item.category||'')}</span></td>`;
        } else {
          const display = val == null || val === '' ? '<span class="empty">—</span>' : esc(val);
          body += `<td class="${classes}">${display}</td>`;
        }
      } else {
        const v = val == null ? '' : val;
        const isNum = col.type === 'num';
        const inputType = isNum ? 'number' : 'text';
        const placeholder = col.type === 'mixed' ? 'číslo nebo text' : '';
        body += `<td class="${classes}" data-col="${col.key}"><input type="${inputType}" value="${esc(v)}" placeholder="${placeholder}"></td>`;
      }
    }
    body += '</tr>';
  }
  body += '</tbody>';

  container.innerHTML = `<table class="grid">${colgroup}${head}${body}</table>`;
  attachEditors();
}

function attachEditors() {
  container.querySelectorAll('tbody tr').forEach(tr => {
    const key = tr.dataset.key;
    const item = DATA.items.find(i => (i._folder + '/' + i.sku) === key);
    if (!item) return;
    tr.querySelectorAll('td[data-col] input').forEach(input => {
      const col = input.closest('td').dataset.col;
      const orig = readCol(item, col);
      input.addEventListener('change', () => commitEdit(item, col, input, orig));
      input.addEventListener('blur', () => commitEdit(item, col, input, orig));
    });
  });
}

function commitEdit(item, col, input, orig) {
  const raw = input.value;
  let val;
  const colDef = COLUMNS.find(c => c.key === col);
  if (colDef.type === 'num') {
    val = raw === '' ? null : Number(raw);
    if (Number.isNaN(val)) val = null;
  } else if (colDef.type === 'mixed') {
    if (raw === '') val = null;
    else {
      const n = Number(raw);
      val = Number.isNaN(n) ? raw : n;
    }
  } else {
    val = raw === '' ? null : raw;
  }
  if (val === orig) return;
  writeCol(item, col, val);
  input.closest('td').classList.add('edited');
  markDirty(item);
}

$('search').addEventListener('input', e => { searchQuery = e.target.value; render(); });
$('cat').addEventListener('change', e => { catFilter = e.target.value; render(); });
$('pick').addEventListener('click', pickFolder);
$('save').addEventListener('click', saveAll);

window.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); saveAll(); }
});
window.addEventListener('beforeunload', e => {
  if (dirty.size > 0) { e.preventDefault(); e.returnValue = ''; }
});

render();
refreshSaveBtn();
</script>
</body>
</html>
